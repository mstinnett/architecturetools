<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dimension Converter -- architecture.tools</title>
<link rel="stylesheet" href="assets/css/global.css">
<style>
  /* Page-specific only */
  .input-group input[type="text"] { width: 160px; }
  .input-group select { min-width: 220px; }

  .prec-row { display: flex; align-items: baseline; padding: 0.5rem 0; border-bottom: var(--border-light); }
  .prec-row:last-child { border-bottom: none; }
  .prec-row.is-exact { background: var(--gray-50); margin: 0 -0.5rem; padding: 0.5rem; }
  .prec-label { width: 80px; flex-shrink: 0; font-size: var(--text-xs); font-family: var(--font-mono); font-weight: 300; color: var(--gray-400); }
  .prec-value { font-family: var(--font-mono); font-size: var(--text-base); font-weight: 300; flex: 1; }
  .prec-error { font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 300; color: var(--gray-400); width: 100px; text-align: right; flex-shrink: 0; }
  .prec-row.is-exact .prec-value { color: var(--black); font-weight: 400; }
  .prec-row.is-exact .prec-error { color: var(--gray-600); }
</style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <h1>Dimension Converter</h1>
    <p>Enter a dimension in any format. See it in all formats with precision brackets.</p>
  </div>

  <div class="section-label">Input</div>
  <div class="input-row" style="margin-bottom:2rem;">
    <div class="input-group">
      <label>Value</label>
      <input type="text" id="dimInput" placeholder="e.g. 3.625" autofocus>
    </div>
    <div class="input-group">
      <label>Unit</label>
      <select id="dimUnit">
        <option value="decimal_in">Decimal inches</option>
        <option value="fractional_in">Fractional inches (e.g. 3-5/8)</option>
        <option value="feet_in">Feet-inches (e.g. 4'-3 1/2")</option>
        <option value="mm">Millimeters</option>
        <option value="cm">Centimeters</option>
        <option value="m">Meters</option>
      </select>
    </div>
  </div>

  <div id="results" style="display:none;margin-bottom:2rem;">
    <div class="section-label">Conversions</div>
    <div class="result-row"><div class="result-label">Decimal in</div><div class="result-value" id="r-decin"></div></div>
    <div class="result-row"><div class="result-label">Feet-Inches</div><div class="result-value" id="r-ftin"></div></div>
    <div class="result-row"><div class="result-label">Millimeters</div><div class="result-value" id="r-mm"></div></div>
    <div class="result-row"><div class="result-label">Centimeters</div><div class="result-value" id="r-cm"></div></div>
    <div class="result-row"><div class="result-label">Meters</div><div class="result-value" id="r-m"></div></div>
  </div>

  <div id="precisionTable" style="display:none;margin-top:2rem;">
    <div class="section-label">Fractional Precision</div>
    <div id="precRows"></div>
  </div>

  <div class="page-footer">architecture.tools</div>
</div>

<script>
(function(){
  var precisions = [1, 2, 4, 8, 16, 32, 64];
  var precLabels = ['1"', '1/2"', '1/4"', '1/8"', '1/16"', '1/32"', '1/64"'];

  function parseFractional(str) {
    str = str.trim().replace(/"/g, '');
    var parts = str.split(/[\s-]+/);
    var whole = 0, num = 0, den = 1;
    for (var i = 0; i < parts.length; i++) {
      var p = parts[i];
      if (p.indexOf('/') >= 0) { var frac = p.split('/'); num = parseFloat(frac[0]); den = parseFloat(frac[1]); }
      else { whole = parseFloat(p); }
    }
    return whole + (den ? num / den : 0);
  }

  function parseFeetInches(str) {
    str = str.trim().replace(/"/g, '');
    var feet = 0, inches = 0;
    var feetMatch = str.match(/(\d+\.?\d*)\s*'/);
    if (feetMatch) feet = parseFloat(feetMatch[1]);
    var afterFeet = str.replace(/\d+\.?\d*\s*'[-\s]*/,'').trim();
    if (afterFeet) {
      if (afterFeet.indexOf('/') >= 0) inches = parseFractional(afterFeet);
      else inches = parseFloat(afterFeet) || 0;
    }
    return feet * 12 + inches;
  }

  function toInches(val, unit) {
    switch(unit) {
      case 'decimal_in': return parseFloat(val);
      case 'fractional_in': return parseFractional(val);
      case 'feet_in': return parseFeetInches(val);
      case 'mm': return parseFloat(val) / 25.4;
      case 'cm': return parseFloat(val) / 2.54;
      case 'm': return parseFloat(val) / 0.0254;
      default: return NaN;
    }
  }

  function toFraction(inches, denom) {
    var totalParts = Math.round(inches * denom);
    var whole = Math.floor(Math.abs(totalParts) / denom);
    var rem = Math.abs(totalParts) % denom;
    var sign = totalParts < 0 ? '-' : '';
    if (rem === 0) return sign + whole + '"';
    var g = gcd(rem, denom); rem = rem / g; var d = denom / g;
    if (whole === 0) return sign + rem + '/' + d + '"';
    return sign + whole + '-' + rem + '/' + d + '"';
  }

  function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

  function toFeetInches(inches, denom) {
    var neg = inches < 0; inches = Math.abs(inches);
    var feet = Math.floor(inches / 12);
    var rem = inches - feet * 12;
    var fracPart = toFraction(rem, denom).replace('"','');
    var sign = neg ? '-' : '';
    if (feet === 0) return sign + fracPart + '"';
    return sign + feet + "'-" + fracPart + '"';
  }

  function formatDecimal(n, dp) {
    if (Number.isInteger(n)) return n.toString();
    var s = n.toFixed(dp);
    s = s.replace(/0+$/, '');
    if (s.endsWith('.')) s = s + '0';
    return s;
  }

  function update() {
    var val = document.getElementById('dimInput').value.trim();
    var unit = document.getElementById('dimUnit').value;
    if (!val) { document.getElementById('results').style.display = 'none'; document.getElementById('precisionTable').style.display = 'none'; return; }
    var inches = toInches(val, unit);
    if (isNaN(inches)) { document.getElementById('results').style.display = 'none'; document.getElementById('precisionTable').style.display = 'none'; return; }
    document.getElementById('results').style.display = '';
    document.getElementById('precisionTable').style.display = '';
    var mm = inches * 25.4, cm = inches * 2.54, m = inches * 0.0254;
    document.getElementById('r-decin').textContent = formatDecimal(inches, 6) + '"';
    document.getElementById('r-ftin').textContent = toFeetInches(inches, 16);
    document.getElementById('r-mm').textContent = formatDecimal(mm, 2) + ' mm';
    document.getElementById('r-cm').textContent = formatDecimal(cm, 3) + ' cm';
    document.getElementById('r-m').textContent = formatDecimal(m, 4) + ' m';
    var html = '';
    for (var i = 0; i < precisions.length; i++) {
      var denom = precisions[i];
      var rounded = Math.round(inches * denom) / denom;
      var error = Math.abs(inches - rounded) * 25.4;
      var isExact = error < 0.001;
      var display = toFeetInches(inches, denom);
      html += '<div class="prec-row'+(isExact?' is-exact':'')+'"><div class="prec-label">'+precLabels[i]+'</div><div class="prec-value">'+display+'</div><div class="prec-error">'+(isExact?'exact':(error<0.01?'<0.01 mm':formatDecimal(error,2)+' mm off'))+'</div></div>';
    }
    document.getElementById('precRows').innerHTML = html;
  }
  document.getElementById('dimInput').addEventListener('input', update);
  document.getElementById('dimUnit').addEventListener('change', update);
  document.getElementById('dimInput').value = '92.075';
  update();
})();
</script>
</body>
</html>
