# Pages CMS configuration — https://pagescms.org
#
# This file is optional. hardware-data.json is designed to be hand-edited in any
# text editor; Pages CMS is just a web-UI alternative. The picker at the site
# root (index.html) fetches the same JSON at runtime, so anything committed —
# from the CMS or a text editor — goes live with no build step.
#
# The file is edited as JSON (syntax-highlighted code) — the same `format: code`
# pattern Pages CMS uses for its own JSON config. This keeps the whole nested
# structure editable and avoids any chance of the CMS dropping unlisted fields.
#
# Repeated values are defined once: the CPUs/GPUs/Chips catalogs hold each model
# name and its standard note, and spec cells reference them by short key (e.g.
# "gpu": "rtx5090"). See the "_legend" field at the top of the JSON for the note
# convention. Edit a name or shared note in the catalog and every spec updates.

content:
  - name: hardware
    label: Hardware data
    description: >-
      CPU/GPU class and model recommendations, monitors, laptops, and prebuilt
      picks that power the picker. CPUs, GPUs, and Chips are catalogs referenced
      by key from the WindowsSpecs/MacSpecs cells (edit a model name or shared
      note once). Other top-level keys include Prebuilts, Monitors, Laptops,
      Apps, PickerOptions, and the label maps. See "_legend" for the conventions.
    type: file
    path: assets/data/hardware-data.json
    format: code
    options:
      language: json
